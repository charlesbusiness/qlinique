services:
  mysql:
    image: mysql:8.0
    container_name: klinical-mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-clinic}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}

    ports:
      - "${DB_PORT:-3306}:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: klinical-app

    working_dir: /var/www

    volumes:
      - .:/var/www

    entrypoint: ["php"]

    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-clinic}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-secret}

    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: